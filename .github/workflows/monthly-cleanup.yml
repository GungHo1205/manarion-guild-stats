name: Monthly Repo Cleanup

on:
  schedule:
    - cron: "0 0 1 * *"  # 1st of every month at midnight
  workflow_dispatch:       # allow manual trigger if ever needed

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needs full history to rewrite it

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Strip large blobs from history
        run: git filter-repo --strip-blobs-bigger-than 50M --force

      - name: Re-add remote and force push
        run: |
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin master --force

      - name: Report final repo size
        run: |
          echo "=== Repo size after cleanup ==="
          git count-objects -vH